# The URL the site will be built for
base_url = "https://vala.dev"

# The site title and description; used in feeds by default.
title = "Vala Programming Language"
description = "Vala is an object-oriented programming language with a self-hosting compiler that generates C code and uses the GObject type system."

# The default language; used in feeds.
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

generate_feeds = true

# The filenames to use for the feeds. Used as the template filenames, too.
# Defaults to ["atom.xml"], which has a built-in template that renders an Atom 1.0 feed.
# There is also a built-in template "rss.xml" that renders an RSS 2.0 feed.
feed_filenames = ["atom.xml"]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
extra_syntaxes_and_themes = ["syntaxes"]

highlight_code = true

highlight_theme = "css"

highlight_themes_css = [
  { theme = "OneHalfLight", filename = "css/syntax-theme-light.css" },
  { theme = "OneHalfDark", filename = "css/syntax-theme-dark.css" },
]

# When set to "true", emoji aliases translated to their corresponding
# Unicode emoji equivalent in the rendered Markdown files. (e.g.: :smile: => 😄)
render_emoji = true


# Optional translation object for the default language
# Example:
#     default_language = "fr"
#
#     [translations]
#     title = "Un titre"
#
